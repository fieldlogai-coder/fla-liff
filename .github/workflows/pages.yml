name: Deploy static site to GitHub Pages

# 目的: 旧「Deploy from a branch」経路が wedge した際の回避。
# 静的ファイル（このリポジトリ直下の *.html / fla-core.js）をそのまま Pages へデプロイする。
# 使い方: Settings → Pages → Source を「GitHub Actions」に切替 → このワークフローで配信。

on:
  push:
    branches: [main]
  workflow_dispatch:        # Actionsタブから手動実行できるように

permissions:
  contents: read
  pages: write
  id-token: write

# 旧経路(group: pages)とは別グループにして詰まりに巻き込まれないようにする
concurrency:
  group: pages-actions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
